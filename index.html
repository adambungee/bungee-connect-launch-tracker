<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bungee Connect - Launch Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Charts rendered with pure CSS -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0F3460;
      color: #E8E8E8;
      line-height: 1.6;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Header */
    .header {
      margin-bottom: 40px;
    }

    .header-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 20px;
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 40px;
      height: 40px;
      background: #E8611A;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 20px;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      color: #E8E8E8;
    }

    .badge {
      display: inline-block;
      background: rgba(232, 97, 26, 0.2);
      border: 1px solid rgba(232, 97, 26, 0.4);
      color: #F4845F;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .progress-section {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .progress-ring {
      position: relative;
      width: 120px;
      height: 120px;
    }

    .progress-ring-svg {
      transform: rotate(-90deg);
    }

    .progress-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .progress-percentage {
      font-size: 32px;
      font-weight: 700;
      color: #E8611A;
      display: block;
    }

    .progress-label {
      font-size: 12px;
      color: #9CA3AF;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .progress-info {
      display: flex;
      gap: 30px;
    }

    .progress-stat {
      display: flex;
      flex-direction: column;
    }

    .progress-stat-label {
      font-size: 12px;
      color: #9CA3AF;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .progress-stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #E8E8E8;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      border-bottom: 1px solid rgba(232, 97, 26, 0.1);
      padding-bottom: 0;
    }

    .tab-button {
      background: none;
      border: none;
      color: #9CA3AF;
      padding: 12px 0;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
    }

    .tab-button:hover {
      color: #F4845F;
    }

    .tab-button.active {
      color: #E8611A;
    }

    .tab-button.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 2px;
      background: #E8611A;
    }

    /* Card Styles */
    .card {
      background: #16213E;
      border: 1px solid rgba(232, 97, 26, 0.1);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .card.stat {
      text-align: center;
    }

    .stat-icon {
      width: 40px;
      height: 40px;
      background: rgba(232, 97, 26, 0.1);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      color: #E8611A;
    }

    .stat-label {
      font-size: 12px;
      color: #9CA3AF;
      text-transform: uppercase;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: #E8E8E8;
    }

    .grid {
      display: grid;
      gap: 20px;
      margin-bottom: 20px;
    }

    .grid-2 {
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    }

    .grid-3 {
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    }

    .grid-4 {
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    }

    /* Section Header */
    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      margin-top: 30px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      color: #E8E8E8;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title svg {
      color: #E8611A;
    }

    /* Callout Box */
    .callout {
      background: rgba(232, 97, 26, 0.08);
      border: 1px solid rgba(232, 97, 26, 0.2);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
      display: flex;
      gap: 12px;
    }

    .callout-icon {
      color: #E8611A;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .callout-content {
      flex: 1;
    }

    .callout-title {
      font-weight: 600;
      color: #E8E8E8;
      margin-bottom: 4px;
    }

    .callout-text {
      font-size: 14px;
      color: #9CA3AF;
    }

    /* Phase Cards */
    .phase-card {
      background: #16213E;
      border: 1px solid rgba(232, 97, 26, 0.1);
      border-radius: 8px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .phase-card:hover {
      border-color: rgba(232, 97, 26, 0.3);
      background: #1a2a4a;
    }

    .phase-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .phase-title {
      font-weight: 600;
      color: #E8E8E8;
    }

    .phase-badge {
      display: inline-block;
      background: rgba(232, 97, 26, 0.2);
      border: 1px solid rgba(232, 97, 26, 0.4);
      color: #F4845F;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }

    .phase-progress {
      margin-bottom: 8px;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(232, 97, 26, 0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: #E8611A;
      border-radius: 3px;
      transition: width 0.3s;
    }

    .progress-text-small {
      font-size: 12px;
      color: #9CA3AF;
      margin-top: 4px;
    }

    /* Timeline */
    .timeline-steps {
      display: flex;
      justify-content: space-between;
      margin-bottom: 30px;
      position: relative;
    }

    .timeline-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      position: relative;
    }

    .timeline-step:not(:last-child)::after {
      content: '';
      position: absolute;
      top: 20px;
      left: 50%;
      right: -50%;
      height: 2px;
      background: rgba(232, 97, 26, 0.2);
      z-index: 0;
    }

    .timeline-dot {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #16213E;
      border: 2px solid rgba(232, 97, 26, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
      color: #E8611A;
      position: relative;
      z-index: 1;
      margin-bottom: 12px;
    }

    .timeline-label {
      font-size: 12px;
      color: #9CA3AF;
      text-align: center;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* Accordion */
    .accordion-item {
      background: #16213E;
      border: 1px solid rgba(232, 97, 26, 0.1);
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .accordion-header {
      padding: 16px;
      background: #1a2a4a;
      border-bottom: 1px solid rgba(232, 97, 26, 0.1);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.2s;
    }

    .accordion-header:hover {
      background: #1f3450;
    }

    .accordion-title {
      font-weight: 600;
      color: #E8E8E8;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .accordion-icon {
      color: #E8611A;
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .accordion-content {
      padding: 16px;
      display: none;
    }

    .accordion-content.open {
      display: block;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px;
      background: rgba(232, 97, 26, 0.05);
      border-radius: 6px;
      border: 1px solid rgba(232, 97, 26, 0.1);
    }

    .task-checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(232, 97, 26, 0.3);
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      transition: all 0.2s;
    }

    .task-checkbox:hover {
      border-color: #E8611A;
    }

    .task-checkbox.checked {
      background: #E8611A;
      border-color: #E8611A;
    }

    .task-checkbox.checked svg {
      color: white;
      width: 14px;
      height: 14px;
    }

    .task-content {
      flex: 1;
    }

    .task-text {
      color: #E8E8E8;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .task-text.done {
      color: #9CA3AF;
      text-decoration: line-through;
    }

    .task-controls {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .task-button {
      background: rgba(232, 97, 26, 0.2);
      border: 1px solid rgba(232, 97, 26, 0.3);
      color: #F4845F;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    .task-button:hover {
      background: rgba(232, 97, 26, 0.3);
      border-color: rgba(232, 97, 26, 0.5);
    }

    .task-note {
      font-size: 12px;
      color: #9CA3AF;
      background: rgba(0, 0, 0, 0.2);
      padding: 8px;
      border-radius: 4px;
      border-left: 2px solid #E8611A;
      max-height: 100px;
      overflow-y: auto;
    }

    .note-editor {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
    }

    .note-textarea {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(232, 97, 26, 0.3);
      border-radius: 4px;
      color: #E8E8E8;
      padding: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      resize: vertical;
      min-height: 60px;
      max-height: 150px;
    }

    .note-textarea:focus {
      outline: none;
      border-color: #E8611A;
      background: rgba(0, 0, 0, 0.5);
    }

    .note-buttons {
      display: flex;
      gap: 8px;
    }

    .note-button {
      flex: 1;
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .note-button.save {
      background: #E8611A;
      color: white;
    }

    .note-button.save:hover {
      background: #D85515;
    }

    .note-button.cancel {
      background: rgba(232, 97, 26, 0.1);
      color: #F4845F;
      border: 1px solid rgba(232, 97, 26, 0.3);
    }

    .note-button.cancel:hover {
      background: rgba(232, 97, 26, 0.2);
    }

    /* Pricing Cards */
    .pricing-card {
      background: #16213E;
      border: 1px solid rgba(232, 97, 26, 0.1);
      border-radius: 8px;
      padding: 24px;
      position: relative;
      transition: all 0.2s;
    }

    .pricing-card:hover {
      border-color: rgba(232, 97, 26, 0.3);
      transform: translateY(-2px);
    }

    .pricing-card.popular {
      border-color: #E8611A;
      background: #1a2f4a;
    }

    .pricing-popular-badge {
      position: absolute;
      top: -12px;
      right: 20px;
      background: #E8611A;
      color: white;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .pricing-name {
      font-size: 18px;
      font-weight: 600;
      color: #E8E8E8;
      margin-bottom: 8px;
    }

    .pricing-price {
      font-size: 32px;
      font-weight: 700;
      color: #E8611A;
      margin-bottom: 4px;
    }

    .pricing-price-label {
      font-size: 12px;
      color: #9CA3AF;
      margin-bottom: 20px;
    }

    .pricing-features {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .pricing-feature {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #E8E8E8;
    }

    .pricing-feature svg {
      color: #10B981;
      flex-shrink: 0;
    }

    /* Chart Container */
    .chart-container {
      background: #16213E;
      border: 1px solid rgba(232, 97, 26, 0.1);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      width: 100%;
      height: 400px;
    }

    /* Badge */
    .badge-inline {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      margin-left: 8px;
    }

    .badge-critical {
      background: rgba(239, 68, 68, 0.2);
      color: #EF4444;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .badge-high {
      background: rgba(245, 158, 11, 0.2);
      color: #F59E0B;
      border: 1px solid rgba(245, 158, 11, 0.3);
    }

    .badge-medium {
      background: rgba(59, 130, 246, 0.2);
      color: #3B82F6;
      border: 1px solid rgba(59, 130, 246, 0.3);
    }

    .badge-low {
      background: rgba(16, 185, 129, 0.2);
      color: #10B981;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    /* Risk Card */
    .risk-card {
      background: #16213E;
      border: 1px solid rgba(232, 97, 26, 0.1);
      border-radius: 8px;
      padding: 16px;
    }

    .risk-title {
      font-weight: 600;
      color: #E8E8E8;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .risk-description {
      font-size: 13px;
      color: #9CA3AF;
      margin-bottom: 12px;
    }

    .risk-badges {
      display: flex;
      gap: 8px;
    }

    /* Feature Grid */
    .feature-item {
      background: #16213E;
      border: 1px solid rgba(232, 97, 26, 0.1);
      border-radius: 8px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .feature-icon {
      width: 32px;
      height: 32px;
      background: rgba(232, 97, 26, 0.1);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #E8611A;
      flex-shrink: 0;
    }

    .feature-text {
      font-size: 13px;
      color: #E8E8E8;
    }

    /* Gap Item */
    .gap-item {
      background: rgba(239, 68, 68, 0.05);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 8px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .gap-icon {
      width: 32px;
      height: 32px;
      background: rgba(239, 68, 68, 0.1);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #EF4444;
      flex-shrink: 0;
    }

    .gap-text {
      font-size: 13px;
      color: #E8E8E8;
    }

    /* KPI Card */
    .kpi-card {
      background: #16213E;
      border: 1px solid rgba(232, 97, 26, 0.1);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
    }

    .kpi-icon {
      width: 40px;
      height: 40px;
      background: rgba(232, 97, 26, 0.1);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      color: #E8611A;
    }

    .kpi-name {
      font-size: 13px;
      font-weight: 600;
      color: #E8E8E8;
      margin-bottom: 8px;
    }

    .kpi-value {
      font-size: 24px;
      font-weight: 700;
      color: #E8611A;
      margin-bottom: 4px;
    }

    .kpi-target {
      font-size: 12px;
      color: #9CA3AF;
    }

    /* Summary Cards */
    .summary-card {
      background: #16213E;
      border: 1px solid rgba(232, 97, 26, 0.1);
      border-radius: 8px;
      padding: 16px;
    }

    .summary-label {
      font-size: 12px;
      color: #9CA3AF;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .summary-value {
      font-size: 22px;
      font-weight: 700;
      color: #E8611A;
    }

    /* Footer */
    .footer {
      margin-top: 60px;
      padding-top: 20px;
      border-top: 1px solid rgba(232, 97, 26, 0.1);
      text-align: center;
      color: #9CA3AF;
      font-size: 13px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header-content {
        flex-direction: column;
        align-items: flex-start;
      }

      .progress-section {
        flex-direction: column;
      }

      .timeline-steps {
        flex-direction: column;
        gap: 20px;
      }

      .timeline-step:not(:last-child)::after {
        display: none;
      }

      .tabs {
        flex-wrap: wrap;
      }

      .grid-2, .grid-3, .grid-4 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

                <div className="timeline-steps">
                  {phases.map((phase, idx) => (
                    <div key={idx} className="timeline-step">
                      <div className="timeline-dot">{idx + 1}</div>
                      <div className="timeline-label">{phase.name.split(":")[0]}</div>
                    </div>
                  ))}
                </div>

                <div>
                  {phases.map((phase, phaseIdx) => (
                    <div key={phaseIdx} className="accordion-item">
                      <div
                        className="accordion-header"
                        onClick={() => setExpandedPhase(expandedPhase === phaseIdx ? -1 : phaseIdx)}
                      >
                        <div className="accordion-title">
                          <Icons.ChevronRight
                            size={20}
                            style={{ transform: expandedPhase === phaseIdx ? "rotate(90deg)" : "rotate(0deg)", transition: "transform 0.2s" }}
                          />
                          <span>{phase.name}</span>
                          <span style={{ marginLeft: "auto", fontSize: "12px", color: BRAND.textMuted }}>
                            {phase.tasks.filter(t => t.done).length}/{phase.tasks.length} complete
                          </span>
                        </div>
                      </div>
                      <div className={`accordion-content ${expandedPhase === phaseIdx ? "open" : ""}`}>
                        <div className="task-list">
                          {phase.tasks.map((task) => (
                            <div key={task.id} className="task-item">
                              <div
                                className={`task-checkbox ${task.done ? "checked" : ""}`}
                                onClick={() => toggleTask(phaseIdx, task.id)}
                              >
                                {task.done && <Icons.CheckCircle size={16} />}
                              </div>
                              <div className="task-content">
                                <div className={`task-text ${task.done ? "done" : ""}`}>{task.text}</div>
                                <div className="task-controls">
                                  <button
                                    className="task-button"
                                    onClick={() => openNoteEditor(phaseIdx, task.id)}
                                  >
                                    {task.note ? "Edit Note" : "Add Note"}
                                  </button>
                                </div>
                                {editingNote?.phaseIndex === phaseIdx && editingNote?.taskId === task.id ? (
                                  <div className="note-editor">
                                    <textarea
                                      className="note-textarea"
                                      value={noteDraft}
                                      onChange={(e) => setNoteDraft(e.target.value)}
                                      onKeyDown={handleNoteKeyDown}
                                      placeholder="Add a note... (Ctrl+Enter to save, Esc to cancel)"
                                      autoFocus
                                    />
                                    <div className="note-buttons">
                                      <button className="note-button save" onClick={saveNote}>
                                        <Icons.Save size={14} style={{ display: "inline", marginRight: "4px" }} />
                                        Save
                                      </button>
                                      <button className="note-button cancel" onClick={cancelNote}>
                                        <Icons.X size={14} style={{ display: "inline", marginRight: "4px" }} />
                                        Cancel
                                      </button>
                                    </div>
                                  </div>
                                ) : task.note ? (
                                  <div className="task-note">{task.note}</div>
                                ) : null}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Monetization Tab */}
            {activeTab === "monetization" && (
              <div>
                <div className="callout">
                  <div className="callout-icon">
                    <Icons.DollarSign size={20} />
                  </div>
                  <div className="callout-content">
                    <div className="callout-title">Core Principle</div>
                    <div className="callout-text">
                      Simple, transparent pricing that scales with operator operations. Free tier builds adoption, Pro for serious operators, Fleet for team management.
                    </div>
                  </div>
                </div>

                <SectionHeader icon={Icons.Target} title="Pricing Tiers" />
                <div className="grid grid-3">
                  {PRICING_TIERS.map((tier, idx) => (
                    <div key={idx} className={`pricing-card ${tier.popular ? "popular" : ""}`}>
                      {tier.popular && <div className="pricing-popular-badge">Most Popular</div>}
                      <div className="pricing-name">{tier.name}</div>
                      <div className="pricing-price">{tier.price === 0 ? "Free" : `$${tier.price}`}</div>
                      <div className="pricing-price-label">{tier.price === 0 ? "Forever" : "per month"}</div>
                      <div className="pricing-features">
                        {tier.features.map((feature, idx) => (
                          <div key={idx} className="pricing-feature">
                            <Icons.CheckCircle size={16} />
                            <span>{feature}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>

                <SectionHeader icon={Icons.TrendingUp} title="Revenue Projections" />
                <div className="chart-container">
                  <CSSBarChart data={REVENUE_DATA} />
                </div>

                <SectionHeader icon={Icons.BarChart3} title="Annual Summary" />
                <div className="grid grid-3">
                  {REVENUE_DATA.map((year, idx) => (
                    <div key={idx} className="summary-card">
                      <div className="summary-label">Year {year.year.slice(-2)}</div>
                      <div className="summary-value">${(year.revenue).toLocaleString()}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* KPIs & Risks Tab */}
            {activeTab === "kpis" && (
              <div>
                <div className="callout">
                  <div className="callout-icon">
                    <Icons.Target size={20} />
                  </div>
                  <div className="callout-content">
                    <div className="callout-title">Success Metrics</div>
                    <div className="callout-text">
                      These KPIs track product-market fit, unit economics, and operational health. Measured monthly and reviewed with stakeholders.
                    </div>
                  </div>
                </div>

                <SectionHeader icon={Icons.TrendingUp} title="Key Performance Indicators" />
                <div className="grid grid-4">
                  {KPI_TARGETS.map((kpi, idx) => (
                    <div key={idx} className="kpi-card">
                      <div className="kpi-icon">
                        <Icons.Zap size={20} />
                      </div>
                      <div className="kpi-name">{kpi.name}</div>
                      <div className="kpi-value">{kpi.value}</div>
                      <div className="kpi-target">Target: {kpi.target}</div>
                    </div>
                  ))}
                </div>

                <SectionHeader icon={Icons.AlertTriangle} title="Risk Assessment" />
                <div className="grid grid-2">
                  {RISKS.map((risk, idx) => (
                    <div key={idx} className="risk-card">
                      <div className="risk-title">
                        <Icons.Shield size={18} />
                        {risk.title}
                      </div>
                      <div className="risk-description">{risk.description}</div>
                      <div className="risk-badges">
                        <Badge
                          text={`Likelihood: ${risk.likelihood}`}
                          variant={risk.likelihood === "High" ? "critical" : risk.likelihood === "Medium" ? "high" : "medium"}
                        />
                        <Badge
                          text={`Impact: ${risk.impact}`}
                          variant={risk.impact === "Critical" ? "critical" : risk.impact === "High" ? "high" : "medium"}
                        />
                      </div>
                    </div>
                  ))}
                </div>

                <div className="callout" style={{ marginTop: "30px", borderColor: BRAND.yellow + "40", background: "rgba(245, 158, 11, 0.08)" }}>
                  <div className="callout-icon" style={{ color: BRAND.yellow }}>
                    <Icons.AlertTriangle size={20} />
                  </div>
                  <div className="callout-content">
                    <div className="callout-title">Feature Creep Warning</div>
                    <div className="callout-text">
                      Prioritize core operator experience over advanced features. Secondary features should only launch after achieving 80% retention and positive NPS.
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* Footer */}
            <div className="footer">
              <p>© 2026 Bungee Connect. All rights reserved. Built for the extreme sports community.</p>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
